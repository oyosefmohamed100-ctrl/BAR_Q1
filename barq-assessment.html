<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARQ - تقييم المتدرب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B1A;
    --orange-dark: #E85500;
    --orange-glow: rgba(255, 107, 26, 0.3);
    --black: #0A0A0A;
    --dark: #111111;
    --card: #1A1A1A;
    --card2: #222222;
    --text: #F0F0F0;
    --muted: #888;
    --border: rgba(255,107,26,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,107,26,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .logo {
    font-family: 'Tajawal', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--orange);
    letter-spacing: 6px;
    text-shadow: 0 0 40px var(--orange-glow);
    line-height: 1;
    margin-bottom: 6px;
  }

  .logo span {
    color: white;
    opacity: 0.15;
    font-size: 14px;
    display: block;
    letter-spacing: 12px;
    font-weight: 300;
    margin-top: 4px;
  }

  .header-sub {
    font-size: 14px;
    color: var(--muted);
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 28px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .progress-label { color: var(--muted); }
  .progress-num { color: var(--orange); font-weight: 700; }

  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange-dark), var(--orange));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--orange-glow);
  }

  /* Question Card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 16px;
    animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--orange);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .q-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
    color: white;
  }

  .q-hint {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: var(--card2);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-align: right;
  }

  .option:hover {
    border-color: var(--orange);
    background: rgba(255,107,26,0.08);
    transform: translateX(-2px);
  }

  .option.selected {
    border-color: var(--orange);
    background: rgba(255,107,26,0.12);
    color: white;
  }

  .option.selected .opt-dot {
    background: var(--orange);
    box-shadow: 0 0 10px var(--orange-glow);
  }

  .option.selected .opt-dot::after {
    opacity: 1;
  }

  .opt-dot {
    width: 20px;
    height: 20px;
    min-width: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    position: relative;
    transition: all 0.2s;
    order: 2;
    margin-right: auto;
    margin-left: 0;
  }

  [dir="rtl"] .opt-dot {
    margin-right: auto;
    margin-left: 0;
  }

  .opt-dot::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* Input field */
  .text-input {
    width: 100%;
    background: var(--card2);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 18px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  .text-input:focus {
    border-color: var(--orange);
  }

  .text-input::placeholder { color: var(--muted); }

  /* Number input */
  .number-input-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .num-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--card2);
    border: 1.5px solid rgba(255,255,255,0.1);
    color: white;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: 'Cairo', sans-serif;
  }

  .num-btn:hover {
    background: rgba(255,107,26,0.15);
    border-color: var(--orange);
  }

  .num-display {
    flex: 1;
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    color: var(--orange);
    font-family: 'Tajawal', sans-serif;
  }

  .num-unit {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Multi select */
  .multi-hint {
    font-size: 12px;
    color: var(--orange);
    opacity: 0.7;
    margin-bottom: 14px;
  }

  /* Navigation */
  .nav-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn-next {
    flex: 1;
    padding: 16px;
    background: linear-gradient(135deg, var(--orange-dark), var(--orange));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,107,26,0.3);
  }

  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,107,26,0.4);
  }

  .btn-next:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-back {
    padding: 16px 20px;
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-back:hover {
    border-color: rgba(255,255,255,0.3);
    color: white;
  }

  /* Summary */
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    animation: slideIn 0.4s ease;
  }

  .summary-title {
    font-size: 22px;
    font-weight: 900;
    color: white;
    margin-bottom: 6px;
  }

  .summary-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 12px;
  }

  .summary-row:last-child { border-bottom: none; }

  .summary-q {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
  }

  .summary-a {
    font-size: 14px;
    color: white;
    font-weight: 700;
    text-align: left;
    max-width: 55%;
  }

  .badge {
    display: inline-block;
    background: rgba(255,107,26,0.15);
    color: var(--orange);
    border: 1px solid rgba(255,107,26,0.3);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    margin: 2px;
  }

  .btn-copy {
    width: 100%;
    padding: 16px;
    background: rgba(255,107,26,0.1);
    border: 1.5px solid var(--orange);
    border-radius: 14px;
    color: var(--orange);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-copy:hover {
    background: rgba(255,107,26,0.2);
  }

  .btn-new {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--orange-dark), var(--orange));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(255,107,26,0.3);
  }

  .btn-new:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,107,26,0.4);
  }

  .copy-msg {
    text-align: center;
    font-size: 13px;
    color: #4CAF50;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .copy-msg.show { opacity: 1; }

  /* Slider */
  .slider-wrap { padding: 8px 0; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    outline: none;
    margin: 16px 0;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: var(--orange);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 12px var(--orange-glow);
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }

  .slider-value {
    text-align: center;
    font-size: 32px;
    font-weight: 900;
    color: var(--orange);
    font-family: 'Tajawal', sans-serif;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">BARQ<span>ASSESSMENT</span></div>
    <div class="header-sub">نظام تقييم المتدرب الأولي</div>
  </div>

  <div id="app"></div>
</div>

<script>
const questions = [
  {
    id: 'name',
    type: 'text',
    question: 'ما اسم المتدرب؟',
    hint: 'الاسم الكامل',
    placeholder: 'اكتب الاسم هنا...',
    required: true
  },
  {
    id: 'age',
    type: 'number',
    question: 'كم عمر المتدرب؟',
    hint: 'العمر بالسنوات',
    min: 10, max: 70, default: 25, unit: 'سنة'
  },
  {
    id: 'gender',
    type: 'options',
    question: 'الجنس؟',
    options: ['ذكر', 'أنثى']
  },
  {
    id: 'goal',
    type: 'options',
    question: 'ما الهدف الرئيسي من التمرين؟',
    hint: 'اختر الأقرب لهدفه',
    options: ['حرق دهون وخسارة وزن', 'بناء عضلات وزيادة كتلة', 'تحسين اللياقة العامة', 'رفع المستوى الرياضي', 'إعادة تأهيل وعلاج', 'الحفاظ على الوزن والصحة']
  },
  {
    id: 'level',
    type: 'options',
    question: 'ما مستوى المتدرب الحالي؟',
    hint: 'كم وقت يتمرن؟',
    options: ['مبتدئ — لم يتمرن من قبل', 'مبتدئ — تمرن بشكل غير منتظم', 'متوسط — 6 أشهر إلى سنتين', 'متقدم — أكثر من سنتين بانتظام']
  },
  {
    id: 'days',
    type: 'number',
    question: 'كم يوم في الأسبوع متاح للتمرين؟',
    min: 2, max: 7, default: 4, unit: 'أيام/أسبوع'
  },
  {
    id: 'duration',
    type: 'options',
    question: 'كم مدة الجلسة الواحدة؟',
    options: ['30 دقيقة', '45 دقيقة', '60 دقيقة', '90 دقيقة أو أكثر']
  },
  {
    id: 'location',
    type: 'options',
    question: 'أين سيتمرن؟',
    options: ['جيم متكامل', 'جيم منزلي بأوزان', 'بدون معدات (الجسم فقط)', 'مكان مفتوح (حدائق، ملاعب)']
  },
  {
    id: 'injuries',
    type: 'multi',
    question: 'هل يوجد أي إصابات أو مشاكل صحية؟',
    hint: 'اختر كل ما ينطبق',
    options: ['لا يوجد', 'مشاكل في الركبة', 'مشاكل في الظهر', 'مشاكل في الكتف', 'ضغط أو سكر أو قلب', 'إصابة حديثة']
  },
  {
    id: 'weight',
    type: 'slider',
    question: 'ما وزن المتدرب؟',
    min: 40, max: 150, default: 75, unit: 'كجم'
  },
  {
    id: 'height',
    type: 'slider',
    question: 'ما طول المتدرب؟',
    min: 140, max: 210, default: 170, unit: 'سم'
  },
  {
    id: 'sleep',
    type: 'options',
    question: 'كم ساعة ينام المتدرب في اليوم؟',
    options: ['أقل من 5 ساعات', '5–6 ساعات', '7–8 ساعات', 'أكثر من 8 ساعات']
  },
  {
    id: 'nutrition',
    type: 'options',
    question: 'هل المتدرب يتبع نظام غذائي؟',
    options: ['لا، أكل عشوائي', 'شوية التزام لكن مش منتظم', 'ملتزم بشكل معقول', 'ملتزم جداً ولديه نظام محدد']
  },
  {
    id: 'motivation',
    type: 'options',
    question: 'ما مستوى الدافعية والالتزام المتوقع؟',
    options: ['محتاج تحفيز دايم', 'متحمس لكن بيفقد الحماس', 'ملتزم ومستمر', 'صاحب هدف واضح ومصمم']
  },
  {
    id: 'notes',
    type: 'textarea',
    question: 'أي معلومات إضافية تريد تذكرها؟',
    hint: 'اختياري — أي شيء مهم عن المتدرب',
    placeholder: 'مثال: يعمل ساعات طويلة، لديه مناسبة بعد 3 أشهر...',
    required: false
  }
];

let current = 0;
let answers = {};

function render() {
  const app = document.getElementById('app');

  if (current >= questions.length) {
    renderSummary();
    return;
  }

  const q = questions[current];
  const progress = ((current) / questions.length) * 100;

  let optionsHTML = '';

  if (q.type === 'options') {
    optionsHTML = `<div class="options">` +
      q.options.map(opt => {
        const sel = answers[q.id] === opt ? 'selected' : '';
        return `<div class="option ${sel}" onclick="selectOption('${q.id}', '${opt}')">
          <span>${opt}</span>
          <div class="opt-dot"></div>
        </div>`;
      }).join('') + `</div>`;
  } else if (q.type === 'multi') {
    const selected = answers[q.id] || [];
    optionsHTML = `<div class="multi-hint">يمكن اختيار أكثر من إجابة</div><div class="options">` +
      q.options.map(opt => {
        const sel = selected.includes(opt) ? 'selected' : '';
        return `<div class="option ${sel}" onclick="toggleMulti('${q.id}', '${opt}')">
          <span>${opt}</span>
          <div class="opt-dot" style="border-radius:4px"></div>
        </div>`;
      }).join('') + `</div>`;
  } else if (q.type === 'number') {
    const val = answers[q.id] !== undefined ? answers[q.id] : q.default;
    answers[q.id] = val;
    optionsHTML = `<div class="number-input-wrap">
      <button class="num-btn" onclick="changeNum('${q.id}', -1, ${q.min}, ${q.max})">−</button>
      <div>
        <div class="num-display" id="num-${q.id}">${val}</div>
        <div class="num-unit">${q.unit}</div>
      </div>
      <button class="num-btn" onclick="changeNum('${q.id}', 1, ${q.min}, ${q.max})">+</button>
    </div>`;
  } else if (q.type === 'slider') {
    const val = answers[q.id] !== undefined ? answers[q.id] : q.default;
    answers[q.id] = val;
    optionsHTML = `<div class="slider-wrap">
      <div class="slider-value" id="slider-val-${q.id}">${val} ${q.unit}</div>
      <input type="range" min="${q.min}" max="${q.max}" value="${val}"
        oninput="updateSlider('${q.id}', this.value, '${q.unit}')">
      <div class="slider-labels"><span>${q.min} ${q.unit}</span><span>${q.max} ${q.unit}</span></div>
    </div>`;
  } else if (q.type === 'text') {
    const val = answers[q.id] || '';
    optionsHTML = `<input type="text" class="text-input" id="input-${q.id}"
      placeholder="${q.placeholder}" value="${val}"
      oninput="answers['${q.id}'] = this.value"
      style="height:52px">`;
  } else if (q.type === 'textarea') {
    const val = answers[q.id] || '';
    optionsHTML = `<textarea class="text-input" id="input-${q.id}"
      placeholder="${q.placeholder}" rows="4"
      oninput="answers['${q.id}'] = this.value">${val}</textarea>`;
  }

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label">السؤال ${current + 1} من ${questions.length}</span>
        <span class="progress-num">${Math.round(progress)}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>

    <div class="question-card">
      <div class="q-number">سؤال ${current + 1}</div>
      <div class="q-text">${q.question}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
      ${optionsHTML}
    </div>

    <div class="nav-buttons">
      ${current > 0 ? `<button class="btn-back" onclick="goBack()">رجوع</button>` : ''}
      <button class="btn-next" id="btn-next" onclick="goNext()" ${!canProceed() ? 'disabled' : ''}>
        ${current === questions.length - 1 ? 'عرض النتيجة ✓' : 'التالي →'}
      </button>
    </div>
  `;
}

function canProceed() {
  const q = questions[current];
  if (q.type === 'number' || q.type === 'slider') return true;
  if (!q.required && (q.type === 'text' || q.type === 'textarea')) return true;
  if (q.required === false) return true;
  if (q.type === 'multi') return (answers[q.id] && answers[q.id].length > 0);
  return !!answers[q.id];
}

function selectOption(id, val) {
  answers[id] = val;
  render();
}

function toggleMulti(id, val) {
  if (!answers[id]) answers[id] = [];
  const idx = answers[id].indexOf(val);
  if (idx > -1) answers[id].splice(idx, 1);
  else answers[id].push(val);
  render();
}

function changeNum(id, delta, min, max) {
  const cur = answers[id] || questions.find(q => q.id === id).default;
  const next = Math.max(min, Math.min(max, cur + delta));
  answers[id] = next;
  document.getElementById('num-' + id).textContent = next;
}

function updateSlider(id, val, unit) {
  answers[id] = parseInt(val);
  document.getElementById('slider-val-' + id).textContent = val + ' ' + unit;
}

function goNext() {
  if (!canProceed()) return;
  // Save text input before moving
  const q = questions[current];
  if (q.type === 'text' || q.type === 'textarea') {
    const el = document.getElementById('input-' + q.id);
    if (el) answers[q.id] = el.value;
  }
  current++;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  current--;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderSummary() {
  const app = document.getElementById('app');

  // Calculate BMI
  const w = answers.weight || 75;
  const h = (answers.height || 170) / 100;
  const bmi = (w / (h * h)).toFixed(1);
  let bmiLabel = '';
  if (bmi < 18.5) bmiLabel = 'نقص وزن';
  else if (bmi < 25) bmiLabel = 'وزن طبيعي';
  else if (bmi < 30) bmiLabel = 'زيادة وزن';
  else bmiLabel = 'سمنة';

  const rows = [
    { q: 'الاسم', a: answers.name || '—' },
    { q: 'العمر', a: (answers.age || 25) + ' سنة' },
    { q: 'الجنس', a: answers.gender || '—' },
    { q: 'الهدف', a: answers.goal || '—' },
    { q: 'المستوى', a: answers.level || '—' },
    { q: 'أيام التمرين', a: (answers.days || 4) + ' أيام/أسبوع' },
    { q: 'مدة الجلسة', a: answers.duration || '—' },
    { q: 'مكان التمرين', a: answers.location || '—' },
    { q: 'الوزن / الطول', a: w + ' كجم / ' + (answers.height || 170) + ' سم' },
    { q: 'مؤشر كتلة الجسم', a: bmi + ' — ' + bmiLabel, badge: true },
    { q: 'الإصابات', a: answers.injuries ? answers.injuries.join('، ') : 'لا يوجد' },
    { q: 'النوم', a: answers.sleep || '—' },
    { q: 'التغذية', a: answers.nutrition || '—' },
    { q: 'الدافعية', a: answers.motivation || '—' },
    { q: 'ملاحظات', a: answers.notes || 'لا يوجد' },
  ];

  const summaryText = rows.map(r => `${r.q}: ${r.a}`).join('\n');

  app.innerHTML = `
    <div class="summary-card">
      <div class="summary-title">✓ تقييم ${answers.name || 'المتدرب'}</div>
      <div class="summary-sub">ملخص جاهز لبناء خطة التمرين</div>
      ${rows.map(r => `
        <div class="summary-row">
          <div class="summary-q">${r.q}</div>
          <div class="summary-a">${r.a}</div>
        </div>
      `).join('')}
    </div>

    <button class="btn-copy" onclick="copyText()">نسخ الملخص للكليبورد 📋</button>
    <div class="copy-msg" id="copy-msg">✓ تم النسخ!</div>
    <button class="btn-new" onclick="resetAll()">تقييم متدرب جديد +</button>
  `;

  window._summaryText = summaryText;
}

function copyText() {
  const text = `تقييم متدرب — BARQ\n${'─'.repeat(30)}\n${window._summaryText}`;
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copy-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
  });
}

function resetAll() {
  current = 0;
  answers = {};
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
